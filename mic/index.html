<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#000000" />
    <title>L'eco di un respiro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital@1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./mic.css" />
  </head>
  <body>
    <div id="mic-canvas" aria-hidden="true"></div>

    <div class="mic-ui" id="mic-ui">
      <header class="mic-hero">
        <h1 class="mic-title">L'eco di un respiro</h1>
        <p class="mic-copy">
          Il respiro cambia con noi.<br />
          Nel ritmo, nell'intensità,<br />
          negli stati d'animo.<br />
          Qui diventa traccia visibile,<br />
          un'eco luminosa nello spazio.
        </p>
      </header>

      <section class="mic-panel">
        <p class="mic-message" id="mic-message"></p>
        <div class="mic-progress" aria-hidden="true">
          <div class="mic-progress-fill" id="mic-progress"></div>
        </div>
        <button type="button" class="mic-action" id="mic-action"></button>
      </section>
    </div>

    <script type="module" src="./mic.js"></script>
  </body>
</html>
